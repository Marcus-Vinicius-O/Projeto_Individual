<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TLOU/Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="icon" href="">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>

<body>

    <header class="navbar">
        <div class="logo"><a href="index.html">THE LAST OF US - PARTE 1</a></div>
        <nav class="menu">
            <a href="index.html">Início</a>
            <a href="index.html#sobre">Sobre o Jogo</a>
            <a href="index.html#personagens">Personagens</a>
            <a href="index.html#infectados">Infectados</a>
            <a href="quiz/quiz.html">Quiz</a>

        </nav>
        <a href="login.html" class="btn-login">
            Entrar
        </a>

    </header>


    <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="container">
            <div class=" card-login">
                <h2>Olá de volta!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>
                    <button class="botao" onclick="entrar()">Entrar</button>
                    <div class="mudar_cadastro"> Ainda não tem cadastro?/<a href="cadastro.html">Cadastre-se</a></div>
                </div>


                <div id="div_aguardar" class="loading-div">
                    <img src="assets/loading symbol GIF.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>
            </div>
        </div>
        </div>
    </div>
</body>

</html>

</html>
<script>
    function entrar() {
        aguardar();
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;
        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Para prosseguir, todos os campos devem ser preenchidos!";
            finalizarAguardar();
            return false;
        } else {
            setInterval(sumirMensagem, 5000);
        }
        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("json recebido" .json);
            if (resposta.ok) {
                resposta.json().then(json => {
                    console.log("json recebido" .json);
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    setTimeout(function () {
                        window.location = "./quiz/quiz.html";
                    }, 1000);
                });
            } else {
                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }
        }).catch(function (erro) {
            console.log(erro);
        });
        return false;
    }
    function sumirMensagem() {
        cardErro.style.display = "none";
    }
</script>
