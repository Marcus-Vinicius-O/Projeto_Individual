<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TLOU/Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>

<body>
  <header class="navbar">
    <div class="logo"><a href="index.html">THE LAST OF US - PARTE 1</a></div>
    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="index.html#sobre">Sobre o Jogo</a>
      <a href="index.html#personagens">Personagens</a>
      <a href="index.html#infectados">Infectados</a>
      <a href="quiz/quiz.html">Quiz</a>

    </nav>
    <a href="login.html" class="btn-login">
      Entrar
    </a>


  </header>

  <div class="cadastro">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <div class="titulo_h2_cad">
        <h2>Crie sua Conta!</h2></div>
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar-se</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="assets/loading symbol GIF.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
    <div class="footer">
      <div class="container">
        <div class="logo_footer">
          <a href="https://github.com/Marcus-Vinicius-O" target="_blank">
            <img src="css/imagens/logo_correto.png" class="github_icon">
          </a>
        </div>
        <div class="frase">
          <h4>Projeto acadêmico • SPTech • Marcus Vinicius © 2026</h4>
        </div>


      </div>
    </div>
  </div>

</body>

</html>

<script>

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Para prosseguir, todos os campos devem ser preenchidos!";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 10000);
    }

    // Validação dos campos de input
    if (emailVar.includes('@') == false) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Email inválido!"

      finalizarAguardar();
      return false;
    }

    if (senhaVar.length < 6) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A senha precisa ter no mínimo 6 caracteres!"

      finalizarAguardar();
      return false;
    }
    if (confirmacaoSenhaVar != senhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A confirmação da senha precisa ser igual a senha!"

      finalizarAguardar();
      return false;
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso!";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;

  }
  function sumirMensagem() {
    cardErro.style.display = "none";
  }

</script>
